name: Sync fork with upstream

on:
  schedule:
    - cron: "17 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-fork-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      GIT_LFS_SKIP_SMUDGE: "1"
      GIT_LFS_SKIP_PUSH: "1"

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect upstream repo automatically
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          parent_clone_url="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.clone_url // empty')"
          parent_full_name="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.parent.full_name // empty')"

          if [ -z "$parent_clone_url" ]; then
            echo "This repository does not look like a fork, or the parent repo is unavailable."
            exit 1
          fi

          echo "Detected upstream: $parent_full_name"
          echo "parent_clone_url=$parent_clone_url" >> "$GITHUB_OUTPUT"

      - name: Fetch fork and upstream branches
        run: |
          set -euo pipefail

          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${{ steps.upstream.outputs.parent_clone_url }}"

          git fetch origin "+refs/heads/*:refs/remotes/origin/*" --prune
          git fetch upstream "+refs/heads/*:refs/remotes/upstream/*" --prune

      - name: Sync all upstream branches
        run: |
          set -euo pipefail

          git for-each-ref --format='%(refname:short)' refs/remotes/upstream |
          sed 's#^upstream/##' |
          grep -v '^HEAD$' |
          while IFS= read -r branch; do
            echo ""
            echo "Checking branch: $branch"

            if git show-ref --verify --quiet "refs/remotes/origin/$branch"; then
              if git merge-base --is-ancestor "origin/$branch" "upstream/$branch"; then
                echo "Fast-forwarding: $branch"
                GIT_LFS_SKIP_PUSH=1 git push origin "refs/remotes/upstream/$branch:refs/heads/$branch"
              else
                echo "Skipping diverged branch: $branch"
              fi
            else
              echo "Creating missing branch: $branch"
              GIT_LFS_SKIP_PUSH=1 git push origin "refs/remotes/upstream/$branch:refs/heads/$branch"
            fi
          done
